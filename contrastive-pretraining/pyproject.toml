[tool.pytest.ini_options]
pythonpath = ["mr_rate", "vision_encoder", "scripts"]
testpaths = ["tests"]
addopts = "--cov=mr_rate --cov=vision_encoder --cov-report=term-missing"

[tool.coverage.run]
source = ["mr_rate", "vision_encoder"]
omit = ["*/setup.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
    "if dist.is_initialized",
    "if debug",
]
show_missing = true
